<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sabyasachi | Manpower Cost Dashboard</title>
    <!-- Libraries -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <style>
        :root { --sab-black: #000000; --sab-white: #ffffff; --sab-gold: #AD9651; --sab-gray: #F4F4F4; }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            font-family: 'Calibri', 'Segoe UI', sans-serif; 
            background-color: var(--sab-white); 
            color: var(--sab-black);
            font-size: 14px;
        }

        /* Login */
        #loginScreen { height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; background: var(--sab-black); color: white; }
        .brand-logo-large { font-size: 4rem; letter-spacing: 15px; margin-bottom: 30px; font-weight: bold; }
        .login-form input { width: 300px; background: transparent; border: none; border-bottom: 1px solid var(--sab-gold); color: white; padding: 12px; margin-bottom: 20px; outline: none; text-align: center; font-family: 'Calibri'; }
        .login-btn { width: 300px; padding: 15px; background: var(--sab-gold); color: black; border: none; font-weight: bold; cursor: pointer; letter-spacing: 2px; font-family: 'Calibri'; }

        /* Dashboard Header */
        #mainDashboard { display: none; padding: 20px 40px; }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid black; padding-bottom: 10px; margin-bottom: 5px; }
        .header h1 { letter-spacing: 8px; font-size: 2.2rem; }
        
        .status-bar { display: flex; justify-content: flex-end; gap: 20px; font-size: 0.75rem; color: #666; margin-bottom: 15px; }
        
        /* Filters */
        .filter-bar { 
            display: flex; 
            gap: 12px; 
            background: var(--sab-gray); 
            padding: 20px; 
            margin-bottom: 20px; 
            align-items: flex-end;
            border: 1px solid #ddd;
        }
        .filter-group { display: flex; flex-direction: column; flex: 1; }
        .filter-group label { font-size: 0.7rem; color: #666; font-weight: bold; margin-bottom: 5px; text-transform: uppercase; }
        
        select, .date-input { 
            padding: 8px; 
            border: 1px solid #ccc; 
            font-family: 'Calibri'; 
            font-size: 0.85rem;
            background: white;
            outline: none;
        }
        
        .refresh-btn {
            background: var(--sab-black);
            color: white;
            border: none;
            padding: 10px 25px;
            font-weight: bold;
            cursor: pointer;
            height: 38px;
            letter-spacing: 1px;
        }
        .refresh-btn:hover { background: var(--sab-gold); color: black; }

        /* KPI Tiles */
        .kpi-row { display: flex; gap: 1px; background: black; border: 1px solid black; margin-bottom: 25px; }
        .kpi-tile { flex: 1; background: white; padding: 25px 15px; text-align: center; }
        .kpi-tile label { display: block; font-size: 0.75rem; color: #888; text-transform: uppercase; margin-bottom: 10px; font-weight: bold; }
        .kpi-tile .value { font-size: 1.8rem; font-weight: bold; }

        /* Content Grid */
        .grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px; margin-bottom: 30px; }
        .card { background: white; border: 1px solid #eee; padding: 20px; border-radius: 4px; }
        .card h4 { font-size: 0.85rem; border-bottom: 1px solid black; padding-bottom: 8px; margin-bottom: 15px; font-weight: bold; }
        
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: 8px 0; color: #888; font-size: 0.75rem; border-bottom: 1px solid #ddd; }
        td { padding: 10px 0; border-bottom: 1px solid #f9f9f9; font-size: 0.85rem; }

        /* Graph */
        .graph-section { background: white; border: 1px solid #eee; padding: 30px; border-radius: 4px; }
        .back-btn { background: var(--sab-black); color: white; border: none; padding: 5px 15px; cursor: pointer; display: none; margin-top: 10px; }

        .upload-btn { color: var(--sab-gold); font-weight: bold; cursor: pointer; text-decoration: underline; margin-right: 20px; }
    </style>
</head>
<body>

    <div id="loginScreen">
        <h1 class="brand-logo-large">SABYASACHI</h1>
        <form id="loginForm">
            <input type="email" id="email" placeholder="ADMIN EMAIL" required>
            <input type="password" id="password" placeholder="PASSWORD" required>
            <button type="submit" class="login-btn">ENTER</button>
        </form>
    </div>

    <div id="mainDashboard">
        <div class="status-bar">
            <span id="lastUpdateText">Last Updated: Never</span>
        </div>
        
        <header class="header">
            <h1>SABYASACHI</h1>
            <div>
                <label class="upload-btn" for="fileInput">UPLOAD MASTER</label>
                <input type="file" id="fileInput" style="display:none" onchange="handleExcel(event)">
                <button class="logout-btn" style="padding: 5px 15px; font-family: Calibri; cursor: pointer;" onclick="location.reload()">LOGOUT</button>
            </div>
        </header>

        <div class="filter-bar">
            <div class="filter-group"><label>Cohort</label><select id="cohortFilter"><option value="All">All Cohorts</option></select></div>
            <div class="filter-group"><label>Department</label><select id="deptFilter"><option value="All">All Departments</option></select></div>
            <div class="filter-group"><label>Type</label><select id="typeFilter"><option value="All">All Types</option></select></div>
            <div class="filter-group"><label>Level</label><select id="levelFilter"><option value="All">All Levels</option></select></div>
            <div class="filter-group"><label>FY Start</label><input type="date" id="startDate" class="date-input"></div>
            <div class="filter-group"><label>Analysis Date</label><input type="date" id="endDate" class="date-input"></div>
            <button class="refresh-btn" onclick="calculate()">REFRESH DATA</button>
        </div>

        <div class="kpi-row">
            <div class="kpi-tile"><label>Current HC</label><div id="hc-active" class="value">0</div></div>
            <div class="kpi-tile"><label>Planned / Vacancy</label><div id="hc-planned" class="value">0</div></div>
            <div class="kpi-tile"><label>Monthly Cost</label><div id="cost-monthly" class="value">₹0</div></div>
            <div class="kpi-tile"><label>YTD Cost</label><div id="cost-ytd" class="value">₹0</div></div>
            <div class="kpi-tile"><label>Annual Projection</label><div id="cost-annual" class="value">₹0</div></div>
        </div>

        <div class="grid">
            <div class="card"><h4>BY COHORT</h4><table id="cohortTable"><thead><tr><th>Cohort</th><th>HC</th><th>YTD Cost</th></tr></thead><tbody></tbody></table></div>
            <div class="card"><h4>BY TYPE</h4><table id="typeTable"><thead><tr><th>Type</th><th>HC</th><th>YTD Cost</th></tr></thead><tbody></tbody></table></div>
            <div class="card"><h4>BY LEVEL</h4><table id="levelTable"><thead><tr><th>Level</th><th>HC</th><th>YTD Cost</th></tr></thead><tbody></tbody></table></div>
        </div>

        <div class="graph-section">
            <h3 id="chartTitle" style="letter-spacing: 2px;">FY COST YEAR-ON-YEAR</h3>
            <button id="backBtn" class="back-btn" onclick="resetChart()">← BACK TO YOY</button>
            <div style="height: 350px; margin-top: 20px;"><canvas id="mainChart"></canvas></div>
        </div>
    </div>

    <script>
        let DATA = [];
        let mainChart = null;

        document.getElementById('loginForm').addEventListener('submit', (e) => {
            e.preventDefault();
            if (document.getElementById('email').value === 'admin@sabyasachi.com' && document.getElementById('password').value === 'admin123') {
                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('mainDashboard').style.display = 'block';
                const now = new Date();
                const startYear = now.getMonth() < 3 ? now.getFullYear() - 1 : now.getFullYear();
                document.getElementById('startDate').value = `${startYear}-04-01`;
                document.getElementById('endDate').valueAsDate = now;
            } else { alert("Login failed."); }
        });

        function handleExcel(e) {
            const reader = new FileReader();
            reader.onload = (event) => {
                const workbook = XLSX.read(event.target.result, { type: 'binary', cellDates: true });
                const json = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]]);
                DATA = json.map(row => ({
                    code: row['Employee Code'], cohort: String(row['Cohort'] || 'Other'), dept: String(row['Department'] || 'Other'),
                    type: String(row['Employee Type'] || 'Other'), level: String(row['Level'] || '0'),
                    doj: new Date(row['Date of Joining']),
                    dol: row['Date of Leaving'] ? new Date(row['Date of Leaving']) : null,
                    ctc: parseFloat(String(row['Annual CTC']).replace(/,/g, '')) || 0,
                    status: String(row['Status'])
                }));
                populateDropdowns();
                calculate();
                updateYoYChart();
                document.getElementById('lastUpdateText').innerText = "Last Updated: " + new Date().toLocaleTimeString();
            };
            reader.readAsBinaryString(e.target.files[0]);
        }

        function populateDropdowns() {
            const fill = (id, key) => {
                const vals = [...new Set(DATA.map(d => d[key]))].sort();
                const sel = document.getElementById(id);
                sel.innerHTML = `<option value="All">All ${key.charAt(0).toUpperCase() + key.slice(1)}s</option>`;
                vals.forEach(v => sel.innerHTML += `<option value="${v}">${v}</option>`);
            };
            fill('cohortFilter', 'cohort'); fill('deptFilter', 'dept'); fill('typeFilter', 'type'); fill('levelFilter', 'level');
        }

        function calculate() {
            const end = new Date(document.getElementById('endDate').value);
            const startFY = new Date(document.getElementById('startDate').value);
            
            const selCohort = document.getElementById('cohortFilter').value;
            const selDept = document.getElementById('deptFilter').value;
            const selType = document.getElementById('typeFilter').value;
            const selLevel = document.getElementById('levelFilter').value;

            let filtered = DATA.filter(d => 
                (selCohort === "All" || d.cohort === selCohort) &&
                (selDept === "All" || d.dept === selDept) &&
                (selType === "All" || d.type === selType) &&
                (selLevel === "All" || d.level === selLevel)
            );

            let mCost = 0, ytdCost = 0, activeHC = 0, vacancyHC = 0;

            filtered.forEach(emp => {
                const doj = emp.doj, dol = emp.dol || new Date(2099, 11, 31);
                
                // Monthly Pro-rata
                mCost += getMonthCost(emp, end.getFullYear(), end.getMonth());
                
                if (doj <= end && dol >= end && emp.status === 'Active') activeHC++;
                if (emp.status.toLowerCase().includes('vacancy')) vacancyHC++;

                // YTD Loop
                let r = new Date(startFY);
                while (r <= end) {
                    ytdCost += getMonthCost(emp, r.getFullYear(), r.getMonth());
                    r.setMonth(r.getMonth() + 1);
                }
            });

            const fyEnd = new Date(startFY.getFullYear() + 1, 2, 31);
            const monthsLeft = (fyEnd.getFullYear() - end.getFullYear()) * 12 + (fyEnd.getMonth() - end.getMonth());
            const annualProjected = ytdCost + (mCost * monthsLeft);

            document.getElementById('hc-active').innerText = activeHC;
            document.getElementById('hc-planned').innerText = vacancyHC;
            document.getElementById('cost-monthly').innerText = fmt(mCost);
            document.getElementById('cost-ytd').innerText = fmt(ytdCost);
            document.getElementById('cost-annual').innerText = fmt(annualProjected);

            updateTable('cohortTable', filtered, 'cohort', startFY, end);
            updateTable('typeTable', filtered, 'type', startFY, end);
            updateTable('levelTable', filtered, 'level', startFY, end);
        }

        function getMonthCost(emp, year, month) {
            const mStart = new Date(year, month, 1);
            const mEnd = new Date(year, month + 1, 0);
            const totalDays = mEnd.getDate();
            const overlapStart = emp.doj > mStart ? emp.doj : mStart;
            const overlapEnd = (emp.dol && emp.dol < mEnd) ? emp.dol : mEnd;

            if (overlapStart <= mEnd && overlapEnd >= mStart) {
                const activeDays = Math.max(0, (overlapEnd - overlapStart) / (1000 * 60 * 60 * 24) + 1);
                return (emp.ctc / 12) * (activeDays / totalDays);
            }
            return 0;
        }

        function updateTable(tableId, filtered, key, fyStart, end) {
            const tbody = document.querySelector(`#${tableId} tbody`);
            tbody.innerHTML = '';
            const groups = [...new Set(filtered.map(d => d[key]))].sort();
            groups.forEach(g => {
                const subset = filtered.filter(d => d[key] === g);
                let gYTD = 0;
                subset.forEach(e => {
                    let r = new Date(fyStart); while(r <= end) { gYTD += getMonthCost(e, r.getFullYear(), r.getMonth()); r.setMonth(r.getMonth()+1); }
                });
                tbody.innerHTML += `<tr><td>${g}</td><td>${subset.length}</td><td>${fmt(gYTD)}</td></tr>`;
            });
        }

        function updateYoYChart() {
            const years = [2023, 2024, 2025];
            const dataset = years.map(y => {
                let total = 0;
                const fyS = new Date(y, 3, 1), fyE = new Date(y+1, 2, 31);
                DATA.forEach(e => {
                    let r = new Date(fyS); while(r <= fyE) { total += getMonthCost(e, r.getFullYear(), r.getMonth()); r.setMonth(r.getMonth()+1); }
                });
                return total;
            });

            if(mainChart) mainChart.destroy();
            mainChart = new Chart(document.getElementById('mainChart').getContext('2d'), {
                type: 'bar',
                data: { labels: ['FY 23-24', 'FY 24-25', 'FY 25-26'], datasets: [{ data: dataset, backgroundColor: '#000' }] },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    onClick: (e, elements) => { if(elements.length > 0) drillDown(years[elements[0].index]); },
                    plugins: { legend: { display: false } }
                }
            });
        }

        function drillDown(year) {
            document.getElementById('chartTitle').innerText = `DEPT BREAKDOWN: FY ${year}-${(year+1).toString().slice(-2)}`;
            document.getElementById('backBtn').style.display = 'block';
            const depts = [...new Set(DATA.map(d => d.dept))].sort();
            const fyS = new Date(year, 3, 1), fyE = new Date(year+1, 2, 31);
            const data = depts.map(d => {
                let t = 0;
                DATA.filter(e => e.dept === d).forEach(e => {
                    let r = new Date(fyS); while(r <= fyE) { t += getMonthCost(e, r.getFullYear(), r.getMonth()); r.setMonth(r.getMonth()+1); }
                });
                return t;
            });
            mainChart.data.labels = depts;
            mainChart.data.datasets[0].data = data;
            mainChart.data.datasets[0].backgroundColor = '#AD9651';
            mainChart.update();
        }

        function resetChart() {
            document.getElementById('chartTitle').innerText = 'FY COST YEAR-ON-YEAR';
            document.getElementById('backBtn').style.display = 'none';
            updateYoYChart();
        }

        function fmt(n) { 
            if (n >= 10000000) return "₹" + (n/10000000).toFixed(2) + " Cr"; 
            if (n >= 100000) return "₹" + (n/100000).toFixed(2) + " L";
            return "₹" + Math.round(n).toLocaleString('en-IN'); 
        }
    </script>
</body>
</html>
